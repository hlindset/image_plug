StylesPath = vale

MinAlertLevel = suggestion

Packages = Microsoft, write-good, proselint
IgnoredScopes = code
Vocab = ImagePlug

[*.{md}]
# ^ This section applies to only Markdown files.
#
# You can change (or add) file extensions here
# to apply these settings to other file types.
#
# For example, to apply these settings to both
# Markdown and reStructuredText:
#
# [*.{md,rst}]
BasedOnStyles = Vale, Microsoft, write-good, proselint
TokenIgnores = (?i)\bauto-orient\b, \bImgproxy\b

# Technical API docs intentionally use terms like URL, HMAC, DPR, RGB, and AVIF
# without expanding them at every occurrence. We also keep title-style headings
# and do not enforce E-Prime in reference prose.
Microsoft.GeneralURL = NO
Microsoft.Headings = NO
Microsoft.HeadingAcronyms = NO
Microsoft.Acronyms = NO
write-good.E-Prime = NO
