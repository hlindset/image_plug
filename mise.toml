[tools]
elixir = "1.20.0-rc.5-otp-29"
node = "latest"

[tasks.setup]
description = "Install Elixir and demo dependencies"
run = [
  "mix deps.get",
  "pnpm install --frozen-lockfile",
]

[tasks.precommit]
description = "Elixir checks: format, compile (warnings as errors), credo, test"
run = [
  "mix format --check-formatted",
  "mix compile --warnings-as-errors",
  "mix credo --strict",
  "mix test",
]

[tasks."precommit:demo"]
description = "Full precommit: Elixir checks plus the demo verify suite"
depends = ["precommit"]
run = "mix demo.verify"
