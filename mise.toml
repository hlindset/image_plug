[tools]
elixir = "1.20.0-otp-29"
node = "latest"

[tasks.setup]
description = "Install library and fiddle dependencies"
run = [
  "mix deps.get",
  "cd fiddle && mix deps.get",
  "pnpm -C fiddle install --frozen-lockfile",
]

[tasks.precommit]
description = "Elixir library checks: format, compile (warnings as errors), credo, test"
run = [
  "mix format --check-formatted",
  "mix compile --warnings-as-errors",
  "mix credo --strict",
  "mix test",
]

[tasks."precommit:demo"]
description = "Library checks plus the fiddle verify suite"
depends = ["precommit"]
run = [
  "cd fiddle && mix format --check-formatted",
  "cd fiddle && mix compile --warnings-as-errors",
  "cd fiddle && mix test",
  "pnpm -C fiddle/assets run test",
  "pnpm -C fiddle/assets run check",
  "pnpm -C fiddle/assets run format:check",
  "pnpm -C fiddle/assets run lint",
  "pnpm -C fiddle/assets run build",
]

[tasks."worktrees:clean"]
description = "Remove regenerable dirs (deps, _build, fiddle deps/_build/node_modules, .dexter, .expert) from every worktree under .worktrees and .claude/worktrees"
run = """
set -eu
root=$(dirname "$(git rev-parse --path-format=absolute --git-common-dir)")
[ -n "$root" ] && [ -d "$root" ] || { echo "could not resolve git root" >&2; exit 1; }
root=$(CDPATH= cd -- "$root" && pwd -P)

# Canonical absolute path of an existing file/dir (resolves symlinks).
resolve() {
  d=$(CDPATH= cd -- "$(dirname -- "$1")" && pwd -P) || return 1
  case "$d" in */) printf '%s%s\\n' "$d" "$(basename -- "$1")" ;;
                *) printf '%s/%s\\n' "$d" "$(basename -- "$1")" ;; esac
}

removed=0
for base in "$root/.worktrees" "$root/.claude/worktrees"; do
  [ -d "$base" ] || continue
  for wt in "$base"/*/; do
    [ -d "$wt" ] || continue
    for target in deps _build fiddle/deps fiddle/_build fiddle/node_modules fiddle/assets/node_modules .dexter .expert; do
      path="$wt$target"
      [ -e "$path" ] || continue
      real=$(resolve "$path") || { echo "skip (unresolvable): $path" >&2; continue; }
      case "$real" in
        "$root"/*) ;;
        *) echo "skip (outside git root): $real" >&2; continue ;;
      esac
      echo "rm -rf ${real#"$root/"}"
      rm -rf "$real"
      removed=$((removed + 1))
    done
  done
done
echo "Cleaned $removed director(ies)."
"""

[tasks.server]
description = "Run the ImagePipe Fiddle dev server (Phoenix + Vite)"
dir = "fiddle"
run = "mix phx.server"

[tasks."server:otel"]
description = "Run the fiddle dev server with OpenTelemetry tracing on (start `mise run jaeger` first)"
dir = "fiddle"
env = { FIDDLE_OTEL = "1" }
run = "mix phx.server"

[tasks.jaeger]
description = "Run a local Jaeger (OTLP + UI) for the fiddle's OpenTelemetry traces"
run = "docker compose -f fiddle/docker-compose.yml up"
