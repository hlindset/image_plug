[tools]
elixir = "1.20.0-otp-29"
node = "latest"

[tasks.setup]
description = "Install library and fiddle dependencies"
run = [
  "mix deps.get",
  "cd fiddle && mix deps.get",
  "pnpm -C fiddle install --frozen-lockfile",
]

[tasks.precommit]
description = "Elixir library checks: format, compile (warnings as errors), credo, test"
run = [
  "mix format --check-formatted",
  "mix compile --warnings-as-errors",
  "mix credo --strict",
  "mix test",
]

[tasks."precommit:demo"]
description = "Library checks plus the fiddle verify suite"
depends = ["precommit"]
run = [
  "cd fiddle && mix format --check-formatted",
  "cd fiddle && mix compile --warnings-as-errors",
  "cd fiddle && mix test",
  "pnpm -C fiddle/assets run test",
  "pnpm -C fiddle/assets run check",
  "pnpm -C fiddle/assets run format:check",
  "pnpm -C fiddle/assets run lint",
  "pnpm -C fiddle/assets run build",
]

[tasks.server]
description = "Run the ImagePipe Fiddle dev server (Phoenix + Vite)"
dir = "fiddle"
run = "mix phx.server"

[tasks."server:otel"]
description = "Run the fiddle dev server with OpenTelemetry tracing on (start `mise run jaeger` first)"
dir = "fiddle"
env = { FIDDLE_OTEL = "1" }
run = "mix phx.server"

[tasks.jaeger]
description = "Run a local Jaeger (OTLP + UI) for the fiddle's OpenTelemetry traces"
run = "docker compose -f fiddle/docker-compose.yml up"
