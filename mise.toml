[tools]
elixir = "1.20.0-otp-29"
node = "latest"

[tasks.setup]
description = "Install library and fiddle dependencies"
run = [
  "mix deps.get",
  "cd fiddle && mix deps.get",
  "pnpm -C fiddle install --frozen-lockfile",
]

# Full imgproxy differential bake (requires Docker). Wraps the whole dance so no
# manual IMGPROXY_DIFF / Ryuk / recompile juggling is needed:
#   - IMGPROXY_DIFF=1 gates the testcontainers dep AND the env-gated gen_fixtures task
#     module; --force is required because toggling the flag doesn't trigger a recompile.
#   - TESTCONTAINERS_RYUK_DISABLED=true: Ryuk (the testcontainers reaper) fails on some
#     local Docker setups; the bake tears its own container down, so this is a no-op
#     where Ryuk works and a fix where it doesn't.
#   - the trailing flag-less `compile --force` restores the default-lane build so a
#     plain `mix test` doesn't see the now-stale generator module.
# `env VAR=val` prefixes keep this shell-agnostic (the run lines are not fish-safe inline).
[tasks."diff:bake"]
description = "Regenerate imgproxy differential fixtures + manifest + REPORT against the pinned container (requires Docker)"
env = { MIX_ENV = "test" }
run = [
  "env IMGPROXY_DIFF=1 mix deps.get",
  "env IMGPROXY_DIFF=1 mix compile --force",
  "env IMGPROXY_DIFF=1 TESTCONTAINERS_RYUK_DISABLED=true mix imgproxy.gen_fixtures",
  "mix compile --force",
]

[tasks.precommit]
description = "Elixir library checks: format, compile (warnings as errors), credo, test"
run = [
  "mix format --check-formatted",
  "mix compile --warnings-as-errors",
  "mix credo --strict",
  "mix test",
]

[tasks."precommit:demo"]
description = "Library checks plus the fiddle verify suite"
depends = ["precommit"]
run = [
  "cd fiddle && mix format --check-formatted",
  "cd fiddle && mix compile --warnings-as-errors",
  "cd fiddle && mix test",
  "pnpm -C fiddle/assets run test",
  "pnpm -C fiddle/assets run check",
  "pnpm -C fiddle/assets run format:check",
  "pnpm -C fiddle/assets run lint",
  "pnpm -C fiddle/assets run build",
]

[tasks."worktrees:clean"]
description = "Remove regenerable dirs (deps, _build, fiddle deps/_build/node_modules, .dexter, .expert) from every worktree under .worktrees and .claude/worktrees"
run = """
set -eu
root=$(dirname "$(git rev-parse --path-format=absolute --git-common-dir)")
[ -n "$root" ] && [ -d "$root" ] || { echo "could not resolve git root" >&2; exit 1; }
root=$(CDPATH= cd -- "$root" && pwd -P)

# Canonical absolute path of an existing file/dir (resolves symlinks).
resolve() {
  d=$(CDPATH= cd -- "$(dirname -- "$1")" && pwd -P) || return 1
  case "$d" in */) printf '%s%s\\n' "$d" "$(basename -- "$1")" ;;
                *) printf '%s/%s\\n' "$d" "$(basename -- "$1")" ;; esac
}

removed=0
for base in "$root/.worktrees" "$root/.claude/worktrees"; do
  [ -d "$base" ] || continue
  for wt in "$base"/*/; do
    [ -d "$wt" ] || continue
    for target in deps _build fiddle/deps fiddle/_build fiddle/node_modules fiddle/assets/node_modules .dexter .expert; do
      path="$wt$target"
      [ -e "$path" ] || continue
      real=$(resolve "$path") || { echo "skip (unresolvable): $path" >&2; continue; }
      case "$real" in
        "$root"/*) ;;
        *) echo "skip (outside git root): $real" >&2; continue ;;
      esac
      echo "rm -rf ${real#"$root/"}"
      rm -rf "$real"
      removed=$((removed + 1))
    done
  done
done
echo "Cleaned $removed director(ies)."
"""

[tasks.server]
description = "Run the ImagePipe Fiddle dev server (Phoenix + Vite)"
dir = "fiddle"
run = "mix phx.server"

[tasks."server:otel"]
description = "Run the fiddle dev server with OpenTelemetry tracing on (start `mise run jaeger` first)"
dir = "fiddle"
env = { FIDDLE_OTEL = "1" }
run = "mix phx.server"

[tasks.jaeger]
description = "Run a local Jaeger (OTLP + UI) for the fiddle's OpenTelemetry traces"
run = "docker compose -f fiddle/docker-compose.yml up"

# IIIF Level 2 image-validator gate (requires Docker).
# Builds the iiif-validator Docker image, starts a local IIIF server on port
# 4000, runs the official iiif-validate.py tool at Level 2, then tears down.
[tasks.validator]
description = "Run the IIIF Level 2 image-validator gate against a live server (requires Docker)"
run = """
set -euo pipefail

docker info >/dev/null 2>&1 || { echo "validator gate needs Docker"; exit 1; }

PORT=4001
IMAGE_ID="67352ccc-d1b0-11e1-89ae-279075081939"
SERVER_PID=""

cleanup() {
  if [ -n "$SERVER_PID" ] && kill -0 "$SERVER_PID" 2>/dev/null; then
    kill "$SERVER_PID"
    wait "$SERVER_PID" 2>/dev/null || true
  fi
}
trap cleanup EXIT INT TERM

echo "==> Building iiif-validator Docker image..."
docker build -t iiif-validator validator/

echo "==> Starting IIIF server on port $PORT..."
PORT=$PORT MIX_ENV=test mix run validator/server.exs &
SERVER_PID=$!

# Wait for the server to be ready (up to 30 s).
deadline=$(($(date +%s) + 30))
until curl -sf "http://localhost:$PORT/iiif/$IMAGE_ID/info.json" >/dev/null 2>&1; do
  if [ "$(date +%s)" -ge "$deadline" ]; then
    echo "ERROR: server did not start within 30 s" >&2
    exit 1
  fi
  sleep 1
done
echo "    server ready."

echo "==> Running IIIF Level 2 validator..."
# --add-host maps host.docker.internal to the host gateway so the validator
# container can reach the host-bound server on Linux runners (it resolves natively
# on Docker Desktop / OrbStack; the explicit mapping is harmless there).
docker run --rm --add-host=host.docker.internal:host-gateway iiif-validator \\
  -s "host.docker.internal:$PORT" \\
  -p iiif \\
  -i "$IMAGE_ID" \\
  --version=3.0 \\
  --level 2
"""
