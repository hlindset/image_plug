name: IIIF Validator

on:
  push:
    branches: ["main"]
    paths: &iiif_paths
      - "lib/image_pipe/parser/iiif/**"
      - "lib/image_pipe/parser/iiif.ex"
      - "validator/**"
      - ".github/workflows/iiif-validator.yml"
  pull_request:
    branches: ["main"]
    paths: *iiif_paths

permissions:
  contents: read

jobs:
  validate:
    name: IIIF Level 2 image-validator
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      # No inline mise_toml: this job needs the project mise.toml's [tasks.validator],
      # so it must use the project config (which now pins erlang explicitly).
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - name: Install Hex
        run: mise exec -- mix local.hex --force
      - name: Install Rebar
        run: mise exec -- mix local.rebar --force
      - name: Install dependencies
        run: mise exec -- mix deps.get
        env:
          MIX_ENV: test
      - name: Compile
        run: mise exec -- mix compile --warnings-as-errors
        env:
          MIX_ENV: test
      - name: Run IIIF Level 2 validator gate
        run: mise exec -- mise run validator
