name: Elixir CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build:
    name: Elixir ${{ matrix.elixir }} / OTP ${{ matrix.erlang }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: 1.17.3-otp-25
            erlang: 25
          - elixir: 1.17.3-otp-26
            erlang: 26
          - elixir: 1.17.3-otp-27
            erlang: 27
          - elixir: 1.18.4-otp-25
            erlang: 25
          - elixir: 1.18.4-otp-26
            erlang: 26
          - elixir: 1.18.4-otp-27
            erlang: 27
          - elixir: 1.18.4-otp-28
            erlang: 28
          - elixir: 1.19.5-otp-26
            erlang: 26
          - elixir: 1.19.5-otp-27
            erlang: 27
          - elixir: 1.19.5-otp-28
            erlang: 28
          - elixir: 1.20.0-rc.4-otp-27
            erlang: 27
          - elixir: 1.20.0-rc.4-otp-28
            erlang: 28

    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v3
        with:
          mise_toml: |
            [tools]
            erlang = "${{ matrix.erlang }}"
            elixir = "${{ matrix.elixir }}"
      - name: Print versions
        run: mise exec -- elixir --version
      - name: Install Hex
        run: mise exec -- mix local.hex --force
      - name: Install Rebar
        run: mise exec -- mix local.rebar --force
      - name: Install dependencies
        run: mise exec -- mix deps.get
      - name: Compile
        run: mise exec -- mix compile --warnings-as-errors
        env:
          MIX_ENV: test
      - name: Check formatting
        run: mise exec -- mix format --check-formatted
        env:
          MIX_ENV: test
      - name: Run tests
        run: mise exec -- mix test --no-compile
        env:
          MIX_ENV: test
