name: Elixir CI

on:
  push:
    branches: ["main"]
    paths: &elixir_paths
      - "lib/**"
      - "test/**"
      - "priv/**"
      - "config/**"
      - "mix.exs"
      - "mix.lock"
      - ".github/workflows/elixir.yml"
  pull_request:
    branches: ["main"]
    paths: *elixir_paths

permissions:
  contents: read

jobs:
  build:
    name: Elixir ${{ matrix.elixir }} / OTP ${{ matrix.erlang }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: 1.17.3-otp-27
            erlang: 27
          - elixir: 1.18.4-otp-27
            erlang: 27
          - elixir: 1.18.4-otp-28
            erlang: 28
          - elixir: 1.19.5-otp-27
            erlang: 27
          - elixir: 1.19.5-otp-28
            erlang: 28
          - elixir: 1.20.0-otp-27
            erlang: 27
          - elixir: 1.20.0-otp-28
            erlang: 28

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          mise_toml: |
            [tools]
            erlang = "${{ matrix.erlang }}"
            elixir = "${{ matrix.elixir }}"
      - name: Print versions
        run: mise exec -- elixir --version
      - name: Install Hex
        run: mise exec -- mix local.hex --force
      - name: Install Rebar
        run: mise exec -- mix local.rebar --force
      - name: Install dependencies
        run: mise exec -- mix deps.get
      - name: Compile
        run: mise exec -- mix compile --warnings-as-errors
        env:
          MIX_ENV: test
      - name: Run tests
        run: mise exec -- mix test --no-compile
        env:
          MIX_ENV: test
