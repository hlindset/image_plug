name: Lint

on:
  push:
    branches: ["main"]
    paths: &lint_paths
      - "lib/**"
      - "test/**"
      - "config/**"
      - "fiddle/**"
      - ".formatter.exs"
      - "mix.exs"
      - "mix.lock"
      - ".github/workflows/lint.yml"
  pull_request:
    branches: ["main"]
    paths: *lint_paths

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    env:
      MIX_ENV: test
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          mise_toml: |
            [tools]
            erlang = "29"
            elixir = "1.20.0-otp-29"
            node = "latest"
            pnpm = "latest"
      - name: Install Hex
        run: mise exec -- mix local.hex --force
      - name: Install Rebar
        run: mise exec -- mix local.rebar --force
      - name: Install library dependencies
        run: mise exec -- mix deps.get
      - name: Install fiddle Elixir dependencies
        run: cd fiddle && mise exec -- mix deps.get
      - name: Install fiddle JS dependencies
        run: mise exec -- pnpm -C fiddle install --frozen-lockfile
      - name: Check library formatting
        run: mise exec -- mix format --check-formatted
      - name: Run Credo
        run: mise exec -- mix credo --strict
      - name: Check fiddle formatting
        run: cd fiddle && mise exec -- mix format --check-formatted
      - name: Fiddle type-check
        run: mise exec -- pnpm -C fiddle/assets run check
      - name: Fiddle format check
        run: mise exec -- pnpm -C fiddle/assets run format:check
      - name: Fiddle lint
        run: mise exec -- pnpm -C fiddle/assets run lint
